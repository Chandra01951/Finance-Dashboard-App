version: '3.8'

services:
  mongo:
    image: mongo:6.0-alpine
    container_name: finance-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: financeDB
    networks:
      - finance-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/financeDB
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      JWT_EXPIRE: 7d
      PORT: 5000
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - finance-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: finance-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: https://finance-dashboard-app-ggbu.onrender.com/api
    depends_on:
      - backend
    networks:
      - finance-network
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  finance-network:
    driver: bridge
